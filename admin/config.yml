# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: Othni07/Cabinet_YAH
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/55588a48-64ea-4de4-9a0f-3038c9b4dc1a/pkce
  auth_token_endpoint: /sites/55588a48-64ea-4de4-9a0f-3038c9b4dc1a/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Better Decap + Bridge logo (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# Add site links in Decap CMS (optional)
site_url: https://othni07.github.io

media_folder: "assets/img/ventes"
public_folder: "/assets/img/ventes"

collections:
  - name: "ventes"
    label: "Biens en vente"
    label_singular: "Bien"
    folder: "content/ventes"
    create: true
    format: "json"
    extension: "json"
    identifier_field: "titre"
    summary: "{{titre}} — {{lieu}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string" }
      - label: "Type de vente"
        name: "type"
        widget: "select"
        options:
          - { label: "Vente judiciaire", value: "judiciaire" }
          - { label: "Vente volontaire", value: "volontaire" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Mise à prix (FCFA)", name: "mise_a_prix", widget: "number", value_type: "int", min: 0 }
      - { label: "Lieu", name: "lieu", widget: "string", default: "San Pedro" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Actif (visible sur le site)", name: "actif", widget: "boolean", default: false }

  - name: "articles"
    label: "Articles (Documentation)"
    label_singular: "Article"
    folder: "content/documentation"
    create: true
    format: "json"
    extension: "json"
    identifier_field: "titre"
    summary: "{{titre}}"
    fields:
      - { label: "Titre", name: "titre", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Extrait", name: "extrait", widget: "string" }
      - { label: "Contenu", name: "contenu", widget: "markdown" }
