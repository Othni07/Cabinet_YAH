name: Build content index

on:
  push:
    branches: [main]
    paths:
      - "content/**"

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Régénérer les fichiers index.json
        run: node build-index.js

      - name: Commit et push si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ventes/index.json content/documentation/index.json
          git diff --staged --quiet || git commit -m "chore: régénère les index de contenu [skip ci]"
          git push
